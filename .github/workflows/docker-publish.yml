name: Docker Publish

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: docker.io

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v1
        with:
          enable-cache: true
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        working-directory: backend
        run: uv sync --all-groups

      - name: Load environment variables
        working-directory: backend
        run: |
          set -a
          source ci.env
          set +a
          env | grep -E '^(ENVIRONMENT|LOGFIRE_TOKEN|DATABASE_|REDIS_|JWT_|LITELLM_|DEBUG|ACCESS_TOKEN_|ALLOWED_ORIGINS)' >> $GITHUB_ENV

      - name: Run tests
        working-directory: backend
        run: uv run nox -s test

  build-and-publish:
    name: Build and Publish Image
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/point-source
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
            type=raw,value=latest

      - name: Login to Docker Hub
        if: ${{ secrets.DOCKERHUB_TOKEN != '' && secrets.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: ${{ secrets.DOCKERHUB_TOKEN != '' && secrets.DOCKERHUB_USERNAME != '' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push skipped notice
        if: ${{ secrets.DOCKERHUB_TOKEN == '' || secrets.DOCKERHUB_USERNAME == '' }}
        run: echo "DOCKERHUB_USERNAME or DOCKERHUB_TOKEN is empty. Image build completed, push skipped."
