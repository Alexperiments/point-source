services:
  nginx:
    container_name: point-source-nginx
    build:
      context: ..
      dockerfile: infra/nginx/Dockerfile
    depends_on:
      point-source:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    networks:
      app:
        ipv4_address: 172.31.0.2
    restart: unless-stopped
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/nginx-health"]
      interval: 10s
      timeout: 5s
      retries: 3

  certbot:
    container_name: point-source-certbot
    image: certbot/certbot:latest
    networks:
      - app
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot-www:/var/www/certbot
      - ./certbot/renew.sh:/usr/local/bin/renew.sh:ro
    entrypoint: ["/bin/sh", "/usr/local/bin/renew.sh"]
    restart: unless-stopped

  point-source:
    container_name: point-source
    build:
      context: ..
      dockerfile: backend/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      app:
        ipv4_address: 172.31.0.3
      database:
      litellm-net:
    restart: unless-stopped
    env_file:
      - ../backend/.env.production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/health/"]
      interval: 10s
      timeout: 5s
      retries: 3

  litellm:
    container_name: litellm-proxy
    image: "ghcr.io/berriai/litellm:main-latest"
    volumes:
      - ./litellm/litellm.yaml:/app/litellm/litellm.yaml
    command: [ "--config", "/app/litellm/litellm.yaml", "--port", "4000" ]
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:4000"
    expose:
      - "4000"
    networks:
      - litellm-net
      - database
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DATABASE_USER:?DATABASE_USER is required}:${DATABASE_PASSWORD:?DATABASE_PASSWORD is required}@postgres:5432/${DATABASE_NAME:?DATABASE_NAME is required}
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379
      STORE_MODEL_IN_DB: "True"
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:?LITELLM_MASTER_KEY is required}
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY:?LITELLM_SALT_KEY is required}
      NO_DOCS: "True"
      UI_USERNAME: "${LITELLM_UI_USERNAME:?LITELLM_UI_USERNAME is required}"
      UI_PASSWORD: "${LITELLM_UI_PASSWORD:?LITELLM_UI_PASSWORD is required}"

  postgres:
    container_name: postgres
    image: timescale/timescaledb-ha:pg17
    shm_size: ${POSTGRES_SHM_SIZE:-1gb}
    command:
      [
        "postgres",
        "-c",
        "config_file=/etc/postgresql/custom/postgresql.conf",
      ]
    environment:
      POSTGRES_USER: ${DATABASE_USER:?DATABASE_USER is required}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD is required}
      POSTGRES_DB: ${DATABASE_NAME:?DATABASE_NAME is required}
    volumes:
      - ${DATABASE_VOLUME_PATH:-/srv/postgres/data}:/home/postgres/pgdata/data
      - ${DATABASE_CONFIG_FILE:-./postgres/postgresql_small.conf}:/etc/postgresql/custom/postgresql.conf:ro
      - /usr/local/bin/wal-g:/usr/local/bin/wal-g:ro
      - /usr/bin/envdir:/usr/bin/envdir:ro
      - /etc/wal-g.d/env:/etc/wal-g.d/env:ro
    networks:
      - database
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-postgres} -d ${DATABASE_NAME:-point_source_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    container_name: redis
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"]
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    networks:
      - database
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  certbot-www:
  letsencrypt:
  postgres-data:
  pgadmin-data:
  redis-data:

networks:
  app:
    ipam:
      config:
        - subnet: 172.31.0.0/24
  litellm-net:
  database:
    internal: true
    ipam:
      config:
        - subnet: 172.30.0.0/24
