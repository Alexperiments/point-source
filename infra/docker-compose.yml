services:
  point-source:
    container_name: point-source
    image: "${POINT_SOURCE_IMAGE:-alexperiments/point-source:latest}"
    pull_policy: always
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - database
      - litellm-net
      - monitoring
    restart: unless-stopped
    environment:
      ENVIRONMENT: "${ENVIRONMENT:-production}"
      LOGFIRE_TOKEN: "${LOGFIRE_TOKEN:?LOGFIRE_TOKEN is required}"
      LOGFIRE_ENVIRONMENT: "${LOGFIRE_ENVIRONMENT:-production}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:?ALLOWED_ORIGINS is required}"
      DATABASE_USER: "${DATABASE_USER:?DATABASE_USER is required}"
      DATABASE_PASSWORD: "${DATABASE_PASSWORD:?DATABASE_PASSWORD is required}"
      DATABASE_HOST: "postgres"
      DATABASE_PORT: "5432"
      DATABASE_NAME: "${DATABASE_NAME:?DATABASE_NAME is required}"
      REDIS_HOST: "redis"
      REDIS_PASSWORD: "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"
      LITELLM_BASE_URL: "http://litellm:4000"
      LITELLM_API_KEY: "${LITELLM_API_KEY:-}"
      JWT_SECRET_KEY: "${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}"
      JWT_ALGORITHM: "${JWT_ALGORITHM:-HS256}"
      JWT_ISSUER: "${JWT_ISSUER:-point-source}"
      JWT_AUDIENCE: "${JWT_AUDIENCE:-point-source}"
      ACCESS_TOKEN_EXPIRE_MINUTES: "${ACCESS_TOKEN_EXPIRE_MINUTES:-30}"
      DEBUG: "${DEBUG:-false}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/health/"]
      interval: 10s
      timeout: 5s
      retries: 3

  litellm:
    container_name: litellm-proxy
    image: "ghcr.io/berriai/litellm:main-latest"
    volumes:
      - ./litellm/litellm.yaml:/app/litellm/litellm.yaml
    command: [ "--config", "/app/litellm/litellm.yaml", "--port", "4000" ]
    restart: unless-stopped
    ports:
      - "4000:4000"
    networks:
      - litellm-net
      - database
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DATABASE_USER:?DATABASE_USER is required}:${DATABASE_PASSWORD:?DATABASE_PASSWORD is required}@postgres:5432/${DATABASE_NAME:?DATABASE_NAME is required}
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379
      STORE_MODEL_IN_DB: "True"
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:?LITELLM_MASTER_KEY is required}
      NO_DOCS: "True"
      UI_USERNAME: "${LITELLM_UI_USERNAME:?LITELLM_UI_USERNAME is required}"
      UI_PASSWORD: "${LITELLM_UI_PASSWORD:?LITELLM_UI_PASSWORD is required}"

  ollama:
    container_name: ollama
    image: "ollama/ollama"
    command: ["serve"]
    expose:
      - "11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - litellm-net
  grafana:
    container_name: grafana
    image: grafana/grafana:latest
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    networks:
      - monitoring
    restart: always
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  prometheus:
    container_name: prometheus
    image: prom/prometheus:latest
    expose:
      - "9090"
    volumes:
      - prometheus-storage:/prometheus
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    networks:
      - monitoring
    restart: always
    depends_on:
      docker-exporter:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3

  docker-exporter:
    container_name: docker-exporter
    image: wywywywy/docker_stats_exporter:latest
    expose:
      - "9487"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - monitoring
    restart: always

  postgres:
    container_name: postgres
    image: timescale/timescaledb-ha:pg17
    shm_size: ${POSTGRES_SHM_SIZE:-12gb}
    command:
      [
        "postgres",
        "-c",
        "maintenance_work_mem=${POSTGRES_MAINTENANCE_WORK_MEM:-10GB}",
      ]
    environment:
      POSTGRES_USER: ${DATABASE_USER:?DATABASE_USER is required}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD is required}
      POSTGRES_DB: ${DATABASE_NAME:?DATABASE_NAME is required}
    expose:
      - "5432"
    volumes:
      - postgres-data:/home/postgres/pgdata/data
    networks:
      - database
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    container_name: redis
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"]
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    networks:
      - database
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  ollama_data:
  grafana-storage:
  prometheus-storage:
  postgres-data:
  pgadmin-data:
  redis-data:

networks:
  litellm-net:
  monitoring:
  database:
