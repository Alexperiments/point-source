limit_req_zone $binary_remote_addr zone=api_per_ip:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;
limit_req_status 429;
limit_conn_status 429;
server_tokens off;

upstream point_source_upstream {
    server point-source:8000;
}

server {
    listen 80;
    server_name point-source.org;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
    }

    location / {
        return 301 https://www.point-source.org$request_uri;
    }
}

server {
    listen 80;
    server_name admin.point-source.org;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port 443;
    proxy_set_header X-Forwarded-Proto https;
    proxy_read_timeout 3600;
    proxy_send_timeout 3600;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header X-XSS-Protection "0" always;

    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
    }

    location ^~ /v1/ {
        return 404;
    }

    location ^~ /legacy/ {
        return 404;
    }

    location / {
        limit_req zone=api_per_ip burst=10 nodelay;
        limit_conn conn_per_ip 10;
        proxy_pass http://point_source_upstream;
    }
}

server {
    listen 80;
    server_name www.point-source.org;

    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 2m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header X-XSS-Protection "0" always;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port 443;
    proxy_set_header X-Forwarded-Proto https;
    proxy_read_timeout 3600;
    proxy_send_timeout 3600;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
    }

    location = /v1/llm/chat/stream {
        limit_req zone=api_per_ip burst=20 nodelay;
        limit_conn conn_per_ip 20;
        proxy_pass http://point_source_upstream;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    location ^~ /v1/ {
        limit_req zone=api_per_ip burst=30 nodelay;
        limit_conn conn_per_ip 20;
        proxy_pass http://point_source_upstream;
    }

    location = /admin {
        return 404;
    }

    location ^~ /admin/ {
        return 404;
    }

    location ^~ /legacy/ {
        limit_req zone=api_per_ip burst=10 nodelay;
        limit_conn conn_per_ip 10;
        proxy_pass http://point_source_upstream;
    }

    location = /docs {
        limit_req zone=api_per_ip burst=5 nodelay;
        proxy_pass http://point_source_upstream;
    }

    location = /redoc {
        limit_req zone=api_per_ip burst=5 nodelay;
        proxy_pass http://point_source_upstream;
    }

    location = /openapi.json {
        limit_req zone=api_per_ip burst=5 nodelay;
        proxy_pass http://point_source_upstream;
    }

    location /assets/ {
        try_files $uri =404;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(?:css|js|ico|png|jpg|jpeg|gif|svg|woff2?)$ {
        try_files $uri =404;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; upgrade-insecure-requests" always;
        try_files $uri $uri/ /index.html;
    }
}
